services:
  - type: web
    name: repo2viral-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GUMROAD_COMMUNICATION_SECRET
        sync: false
